{% extends "base.html" %}
{% block title %}Saved Summaries{% endblock %}
{% block content %}
<div class="summaries-layout" x-data="{ selectedId: null }">
    <h1>Saved Summaries</h1>
    <div class="summaries-pane">
        <div class="search-row">
            <input type="text" class="input" id="summary-search" placeholder="Search by ID..."
                   @keydown.enter="htmx.ajax('GET', '/summaries/list?q=' + $el.value, {target: '#summary-list', swap: 'innerHTML'})">
            <button class="btn btn-primary" id="search-summary-btn"
                    @click="htmx.ajax('GET', '/summaries/list?q=' + document.getElementById('summary-search').value, {target: '#summary-list', swap: 'innerHTML'})">Search</button>
            <button class="btn btn-secondary" id="clear-summary-search"
                    @click="document.getElementById('summary-search').value=''; htmx.ajax('GET', '/summaries/list', {target: '#summary-list', swap: 'innerHTML'})">Clear</button>
        </div>
        <div class="two-pane">
            <div class="pane-left" id="summary-list" hx-get="/summaries/list" hx-trigger="load" hx-swap="innerHTML">
            </div>
            <div class="pane-right results-box" id="summary-detail">
                <pre>Select a summary to view.</pre>
            </div>
        </div>
    </div>
</div>
{% endblock %}
