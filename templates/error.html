{% extends "base.html" %}
{% block title %}Error {{ code }}{% endblock %}
{% block content %}

    <p style="font-size:18px;color:var(--text-secondary);margin-bottom:30px">{{ message }}</p>
    <a href="/" class="btn btn-primary">Go Home</a>
</div>
{% endblock %}
