{% extends "base.html" %}
{% block title %}Chatbot{% endblock %}
{% block content %}
<div class="chat-container" x-data="chatBot()" x-init="init('{{ session_id }}')">
    <h2>TP Query Chatbot</h2>

    <div class="chat-toolbar card">
        <div class="filter-controls">
            <div class="filter-group">
                <span class="filter-label">Client</span>
                <select x-model="filters.client" @change="onFilterChange()">
                    <option value="">All</option>
                    <template x-for="opt in filterOptions.clients" :key="opt">
                        <option x-text="opt" :value="opt"></option>
                    </template>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">Product</span>
                <select x-model="filters.product" @change="onFilterChange()">
                    <option value="">All</option>
                    <template x-for="opt in filterOptions.products" :key="opt">
                        <option x-text="opt" :value="opt"></option>
                    </template>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">Project</span>
                <select x-model="filters.project" @change="onFilterChange()">
                    <option value="">All</option>
                    <template x-for="opt in filterOptions.projects" :key="opt">
                        <option x-text="opt" :value="opt"></option>
                    </template>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">Type</span>
                <select x-model="filters.entity_type" @change="onFilterChange()">
                    <option value="">All</option>
                    <template x-for="opt in filterOptions.types" :key="opt">
                        <option x-text="opt" :value="opt"></option>
                    </template>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">State</span>
                <select x-model="filters.entity_state" @change="onFilterChange()">
                    <option value="">All</option>
                    <template x-for="opt in filterOptions.states" :key="opt">
                        <option x-text="opt" :value="opt"></option>
                    </template>
                </select>
            </div>
        </div>
        <div class="action-controls">
            <button @click="resetFilters()" class="btn btn-secondary">Reset Filters</button>
            <button @click="changeDirection()" class="btn btn-secondary">Change Direction</button>
            <button @click="clearChat()" class="btn btn-danger">New Conversation</button>
        </div>
    </div>

    <div class="chat-messages" x-ref="messages">
        <template x-for="msg in messages" :key="msg.id">
            <div class="chat-msg" :class="'chat-msg-' + msg.role">
                <div class="chat-msg-label" x-text="msg.role === 'user' ? 'You' : 'TP Bot'"></div>
                <div class="chat-msg-content" x-text="msg.content"></div>
                <div class="chat-msg-sources" x-show="msg.sources && msg.sources.length > 0"
                     x-text="'Sources: ' + msg.sources.map(s => (s.type || 'Ticket') + ' #' + s.id + (s.state ? ' (' + s.state + ')' : '')).join(', ')"></div>
            </div>
        </template>
        <div x-show="loading" class="chat-msg chat-msg-assistant">
            <div class="chat-msg-label">TP Bot</div>
            <div class="chat-msg-content typing-indicator">Thinking<span>.</span><span>.</span><span>.</span></div>
        </div>
    </div>

    <form class="chat-input-row" @submit.prevent="sendMessage()">
        <textarea x-model="input" x-ref="chatInput" placeholder="Ask a question about resolved tickets..."
                  class="chat-input chat-input-area" :disabled="loading"
                  @input="autoResize($el)"
                  @keydown.enter.prevent="sendMessage()" rows="1"></textarea>
        <button type="submit" class="btn btn-primary" :disabled="loading || !input.trim()">Send</button>
    </form>
</div>

<style>
.chat-container { width: 100%; padding: 16px; display: flex; flex-direction: column; height: calc(100vh - 80px); }

.chat-toolbar { margin-bottom: 16px; }

.filter-controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 12px;
}

.filter-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1 1 130px;
    min-width: 0;
}

.filter-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.filter-group select {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 7px 10px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
}

.filter-group select:focus {
    border-color: var(--accent);
}

.action-controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
    border-top: 1px solid var(--border);
    padding-top: 12px;
}

.chat-messages { flex: 1; overflow-y: auto; padding: 12px; background: #1e1e1e; border-radius: 8px; margin-bottom: 12px; }
.chat-msg { margin-bottom: 12px; padding: 8px 12px; border-radius: 8px; max-width: 85%; }
.chat-msg-user { background: #2b5278; margin-left: auto; }
.chat-msg-assistant { background: #2a2a2a; }
.chat-msg-label { font-size: 11px; font-weight: bold; color: #888; margin-bottom: 4px; }
.chat-msg-content { line-height: 1.5; white-space: pre-wrap; }
.chat-msg-sources { font-size: 11px; color: #5a8; margin-top: 4px; }
.chat-input-row { display: flex; gap: 8px; }
.chat-input { flex: 1; padding: 10px 12px; border: 1px solid #444; border-radius: 6px; background: #2a2a2a; color: #ddd; font-size: 14px; }
.chat-input-area { resize: none; overflow: hidden; font-family: inherit; max-height: 200px; }
.typing-indicator span { animation: blink 1.4s infinite both; }
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
</style>

<script>
function chatBot() {
    return {
        sessionId: '',
        filters: { client: '', product: '', project: '', entity_type: '', entity_state: '' },
        filterOptions: { clients: [], products: [], projects: [], types: [], states: [] },
        input: '',
        loading: false,
        messages: [],
        init(sid) {
            this.sessionId = sid;
            fetch('/chat/filter-options')
                .then(r => r.json())
                .then(data => { this.filterOptions = data; })
                .catch(() => {});
        },
        async sendMessage() {
            const text = this.input.trim();
            if (!text || this.loading) return;
            this.messages.push({ id: Date.now(), role: 'user', content: text, sources: [] });
            this.input = '';
            this.loading = true;
            try {
                const resp = await fetch('/chat/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: this.sessionId, message: text, ...this.filters }),
                });
                const data = await resp.json();
                if (data.reply) {
                    this.messages.push({ id: Date.now() + 1, role: 'assistant', content: data.reply, sources: data.sources || [] });
                } else if (data.error) {
                    this.messages.push({ id: Date.now() + 1, role: 'assistant', content: 'Error: ' + data.error, sources: [] });
                }
            } catch (e) {
                this.messages.push({ id: Date.now() + 1, role: 'assistant', content: 'Network error. Is the server running?', sources: [] });
            }
            this.loading = false;
            this.scrollToBottom();
            this.$nextTick(() => {
                const ta = this.$refs.chatInput;
                if (ta) ta.style.height = 'auto';
            });
        },
        async changeDirection() {
            try {
                await fetch('/chat/reset-direction', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: this.sessionId }),
                });
            } catch (e) {}
            this.messages.push({
                id: Date.now(),
                role: 'assistant',
                content: '\u2014 Direction reset, searching across all tickets again \u2014',
                sources: [],
            });
            this.scrollToBottom();
        },
        onFilterChange() {
            fetch('/chat/reset-direction', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: this.sessionId }),
            }).catch(() => {});
        },
        resetFilters() {
            this.filters = { client: '', product: '', project: '', entity_type: '', entity_state: '' };
        },
        clearChat() {
            this.messages = [];
            this.sessionId = crypto.randomUUID();
            this.resetFilters();
            this.$nextTick(() => {
                const ta = this.$refs.chatInput;
                if (ta) ta.style.height = 'auto';
            });
        },
        scrollToBottom() {
            setTimeout(() => {
                const container = this.$refs.messages;
                const last = container.lastElementChild;
                if (last) last.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }, 50);
        },
        autoResize(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        },
    };
}
</script>
{% endblock %}
